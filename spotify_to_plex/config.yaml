name: Spotify to Plex
slug: spotify_to_plex
version: "1.0.104"

description: Sync Spotify playlists with Plex

arch:
  - aarch64
  - amd64

startup: application
boot: auto
init: false

ingress: false
ingress_port: 9030

host_network: true

ports:
  9030/tcp: null

options:
  spotify_client_id: ""
  spotify_client_secret: ""
  spotify_redirect_uri: ""
  encryption_key: ""
  plex_app_id: ""

schema:
  spotify_client_id: str
  spotify_client_secret: str
  spotify_redirect_uri: str
  encryption_key: str
  plex_app_id: str

environment:
  STORAGE_DIR: /data
  PORT: "9030"

image: jjdenhertog/spotify-to-plex